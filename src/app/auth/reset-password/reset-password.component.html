<div class="login-wrapper">
  <div class="login-card">

    <h2 class="logo-text">Reset Password</h2>

    <form [formGroup]="resetForm" (ngSubmit)="onReset()">

      <!-- NEW PASSWORD -->
      <div class="form-group">
        <label>New Password</label>

        <div class="input-icon-box">
          <img src="lock.png" class="left-icon" alt="new-password"/>

          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            [class.invalid]="f['password'].touched && f['password'].invalid"
          />

          <!-- EYE ICON -->
           <span
            class="eye-icon"
            [class.open]="!showPassword"
            [class.closed]="showPassword"
            (click)="togglePassword()">
          </span>
        </div>

        <div class="error" *ngIf="f['password'].touched && f['password'].invalid">
          <small>Password must be at least 4 characters.</small>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label>Re-enter New Password</label>

        <div class="input-icon-box">
          <img src="lock.png" class="left-icon" />

          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Re-enter new password"
            [class.invalid]="f['confirmPassword'].touched && f['confirmPassword'].invalid"
          />

          <span
            class="eye-icon"
            [class.open]="!showConfirmPassword"
            [class.closed]="showConfirmPassword"
            (click)="toggleConfirmPassword()">
          </span>
        </div>

        <div class="error" *ngIf="f['confirmPassword'].touched && f['confirmPassword'].invalid">
          <small>Passwords do not match.</small>
        </div>
      </div>

      <!-- SUBMIT BUTTON -->
      <button class="btn-login" type="submit" [disabled]="loading">
        {{ loading ? 'Updating...' : 'Reset Password' }}
      </button>

    </form>

  </div>
</div>
