<app-nav></app-nav>

<div class="login-wrapper">
  <div class="login-card">
    <h2 class="logo-text">Login</h2>

    <form [formGroup]="loginForm">
      <div class="form-group input-icon-box">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Registered email"
        />
        <img src="gmail.png" class="left-icon" />
      </div>
    </form>

    <div class="camera-wrapper">
      <video #video autoplay muted class="camera"></video>
      <canvas #overlay class="face-canvas"></canvas>
      <div class="scan-ring"></div>
      <div class="scan-line"></div>
      <div class="face-status">Align your face</div>
    </div>

    <!-- Buttons in single row -->
    <div class="camera-actions">
      <button class="btn-camera" (click)="startCamera()">Start Camera</button>
      <button class="btn-capture" (click)="faceLogin()" [disabled]="loading">
        {{ loading ? 'Scanning...' : 'Scan Face & Login' }}
      </button>
    </div>
  </div>
</div>
