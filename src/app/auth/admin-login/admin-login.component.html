<app-a-nav></app-a-nav>

<div class="login-container">
  <div class="login-card">
    <h2 class="logo-text">Admin Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>

        <div class="input-icon-box">
          <img src="gmail.png" class="left-icon" alt="email" />

          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            [class.invalid]="f['email'].touched && f['email'].invalid"
          />
        </div>

        <div *ngIf="f['email'].touched && f['email'].invalid" class="error">
          <small *ngIf="f['email'].errors?.['required']">Email is required.</small>
          <small *ngIf="f['email'].errors?.['email']">Invalid email format.</small>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>

        <div class="input-icon-box">
          <img src="lock.png" class="left-icon" alt="password" />

          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            [class.invalid]="f['password'].touched && f['password'].invalid"
          />


          <span
            class="eye-icon"
            [class.open]="!showPassword"
            [class.closed]="showPassword"
            (click)="togglePassword()">
          </span>
        </div>

        <div *ngIf="f['password'].touched && f['password'].invalid" class="error">
          <small>Password is required.</small>
        </div>
      </div>

      <button class="btn-login" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

    </form>
  </div>
</div>
