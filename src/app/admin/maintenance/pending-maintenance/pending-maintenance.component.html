<app-admin-nav></app-admin-nav>
<!-- ================= HERO SECTION ================= -->
<div class="hero">
  <div class="hero-content">

    <div class="header-row">
      <h1 class="hero-title">Pending Maintenance</h1>

      <!-- SEARCH FILTER -->
      <div class="filter-box">
        <input type="text"
               placeholder="Search by month, block, or resident..."
               [(ngModel)]="searchText"
               (input)="applyFilter()">
        <span class="search-icon">🔍</span>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="pendingList.length === 0" class="empty-text">
      No pending maintenance 🎉
    </div>

    <!-- TABLE -->
    <table class="resident-table" *ngIf="pendingList.length > 0">
      <thead>
        <tr>
          <th (click)="sort('residentName')">Resident <span class="sort-icon">⇅</span></th>
          <th (click)="sort('block')">Block <span class="sort-icon">⇅</span></th>
          <th (click)="sort('flat')">Flat <span class="sort-icon">⇅</span></th>
          <th (click)="sort('month')">Month <span class="sort-icon">⇅</span></th>
          <th (click)="sort('amount')">Amount <span class="sort-icon">⇅</span></th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of paginatedList">
          <td>{{ p.residentName }}</td>
          <td>{{ p.block }}</td>
          <td>{{ p.flat }}</td>
          <td>{{ p.month }}</td>
          <td>₹ {{ p.amount }}</td>
          <td>{{ p.status }}</td>
        </tr>
      </tbody>
    </table>
<!-- ================= PAGINATION CONTROLS ================= -->
<div class="pagination" *ngIf="totalPages > 1">
  <button (click)="prevPage()" [disabled]="currentPage === 1">Prev</button>

  <span *ngFor="let page of [].constructor(totalPages); let i = index">
    <button
      (click)="currentPage = i + 1; updatePagination()"
      [class.active]="currentPage === i + 1">
      {{ i + 1 }}
    </button>
  </span>

  <button (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
</div>
  </div>

</div>
