<!-- ================= FORM ================= -->
<section class="hero">
<app-admin-nav></app-admin-nav>
  <div class="hero-content">
    <div class="hero-overline">Security Management</div>
    <h1 class="hero-title">Add New Security</h1>

    <form (ngSubmit)="addSecurity()">
      <div class="form-group">
        <label>Security Name</label>
        <input type="text" [(ngModel)]="security.name" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="security.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Mobile</label>
        <input type="tel" [(ngModel)]="security.mobile" name="mobile" required>
      </div>

      <div class="form-group">
        <label>Shift</label>
        <select [(ngModel)]="security.shift" name="shift" required>
          <option value="" disabled selected>Select Shift</option>
          <option *ngFor="let s of shifts" [value]="s">{{ s }}</option>
        </select>
      </div>

      <!-- Camera -->
      <h3>Capture Face</h3>
      <div class="camera-box">
        <video #video autoplay playsinline></video>
        <canvas #canvas hidden></canvas>
        <div class="camera-actions">
          <button class="btn-camera" type="button" (click)="startCamera()">Start Camera</button>
          <button class="btn-capture" type="button" (click)="captureImage()">Capture Face</button>
        </div>
      </div>

      <!-- Preview -->
      <img *ngIf="imagePreview" [src]="imagePreview" class="preview-img">

      <button type="submit" class="btn-capture">Add Security</button>
    </form>
  </div>
</section>
