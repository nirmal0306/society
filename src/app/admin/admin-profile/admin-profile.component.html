<app-admin-nav></app-admin-nav>
<!-- ================= PROFILE HERO ================= -->
<div class="admin-hero profile-hero">
  <div class="admin-hero-content">
    <h1>Admin Profile</h1>
    <p class="tagline">Your account details</p>
  </div>
</div>

<!-- ================= PROFILE GLASS CARD ================= -->
<div class="profile-section1">
<section class="profile-section">
  <div class="profile-glass">

    <div class="profile-avatar">
      {{ name.charAt(0) | uppercase }}
    </div>

    <div class="profile-field">
      <label>Name</label>
      <p>{{ name }}</p>
    </div>

    <div class="profile-field">
      <label>Email</label>
      <p>{{ email }}</p>
    </div>

  </div>
</section>
</div>
