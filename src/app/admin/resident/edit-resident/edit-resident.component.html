<!-- ================= FORM ================= -->
<section class="hero">
  <div class="hero-content">

    <div class="hero-overline">Resident Management</div>
    <h1 class="hero-title">Edit Resident</h1>

    <form class="resident-form" (ngSubmit)="updateResident()">

      <!-- BASIC INFO -->
      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="resident.name" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="resident.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Mobile</label>
        <input type="tel" [(ngModel)]="resident.mobile" name="mobile" required>
      </div>

      <!-- MULTI FLATS -->
      <h3>Flat Ownership</h3>
      <div class="form-row" *ngFor="let f of resident.flats; let i = index">
        <div class="form-group">
          <label>Block</label>
          <select [(ngModel)]="f.block" name="block{{i}}" required>
            <option value="">Select Block</option>
            <option *ngFor="let b of blocks" [value]="b">{{ b }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Flat</label>
          <select [(ngModel)]="f.flat" name="flat{{i}}" required>
            <option value="">Select Flat</option>
            <option *ngFor="let fl of flats" [value]="fl">{{ fl }}</option>
          </select>
        </div>

        <div class="form-group action-btns">
          <button type="button" *ngIf="i === resident.flats.length - 1" (click)="addFlat()">➕</button>
          <button type="button" *ngIf="resident.flats.length > 1" (click)="removeFlat(i)">➖</button>
        </div>
      </div>

      <!-- CAMERA -->
      <h3>Capture Face</h3>
      <div class="camera-box">
        <video #video autoplay playsinline></video>
        <canvas #canvas hidden></canvas>

        <div class="camera-actions">
          <button class="btn-camera" type="button" (click)="startCamera()">Start Camera</button>
          <button class="btn-capture" type="button" (click)="captureImage()">Capture Face</button>
        </div>
      </div>

      <img *ngIf="imagePreview" [src]="imagePreview" class="preview-img">

      <button type="submit" class="btn btn-yellow">Update Resident</button>
    </form>
  </div>
</section>
