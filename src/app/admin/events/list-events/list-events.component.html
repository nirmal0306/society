<section class="hero">
  <app-admin-nav></app-admin-nav>
  <div class="hero-content">
    <div class="header-row">
    <h1 class="hero-title">Event List</h1>

    <!-- ================= SEARCH + SORT ================= -->
      <div class="filter-box">
        <input
          type="text"
          placeholder="Search events..."
          [(ngModel)]="searchText"
          (input)="applyFilter()"
        >
        <span class="search-icon">🔍</span>
      </div>

    </div>

    <!-- ================= LOADING ================= -->
    <div *ngIf="loading">Loading events...</div>

    <!-- ================= TABLE ================= -->
    <table *ngIf="!loading && paginatedEvents.length" class="resident-table">
      <thead>
        <tr>
          <th (click)="sortData('title')">Title {{ getSortIcon('title') }}</th>
          <th (click)="sortData('date')">Date {{ getSortIcon('date') }}</th>
          <th (click)="sortData('time')">Time {{ getSortIcon('time') }}</th>
          <th>Venue</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let event of paginatedEvents">
          <td>{{ event.title }}</td>
          <td>{{ event.date }}</td>
          <td>{{ event.time }}</td>
          <td>
            <div *ngIf="event.venue?.address">
              {{ event.venue.address }}
            </div>
            <a
              *ngIf="event.venue?.mapUrl"
              [href]="event.venue.mapUrl"
              target="_blank"
              class="map-link"
            >
              <img src="google-maps.png" class="map-icon">
              Open Map
            </a>
          </td>
          <td class="action-icons">
            <img
              src="document.png"
              class="icon-img"
              (click)="editEvent(event._id)"
            >
            <img
              src="user.png"
              class="icon-img"
              (click)="deleteEvent(event._id)"
            >
          </td>
        </tr>
      </tbody>
    </table>

    <!-- ================= NO DATA ================= -->
    <div *ngIf="!loading && !paginatedEvents.length">
      No events found.
    </div>

    <!-- ================= PAGINATION ================= -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button (click)="prevPage()" [disabled]="currentPage === 1">Prev</button>
      <span>Page {{ currentPage }} of {{ totalPages }}</span>
      <button (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
    </div>
  </div>
</section>
