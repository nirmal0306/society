<app-resident-nav></app-resident-nav>
<!-- ================= PROFILE HERO ================= -->
<div class="admin-hero profile-hero">
  <div class="admin-hero-content">
    <h1>Resident Profile</h1>
    <p class="tagline">Your account details</p>
  </div>
</div>

<!-- ================= PROFILE GLASS CARD ================= -->
<section class="profile-section">
  <div class="profile-glass">

    <!-- PROFILE PHOTO / AVATAR -->
    <div class="profile-avatar-container">

      <!-- If Photo Exists -->
      <img *ngIf="photo"
           [src]="'http://localhost:5000' + photo"
           class="profile-photo"
           alt="Profile Photo">

      <!-- If No Photo -->
      <div *ngIf="!photo" class="profile-avatar">
        {{ name ? (name.charAt(0) | uppercase) : 'R' }}
      </div>

    </div>
    <!-- NAME -->
    <div class="profile-field">
      <label>Name</label>
      <p>{{ name }}</p>
    </div>

    <!-- EMAIL -->
    <div class="profile-field">
      <label>Email</label>
      <p>{{ email }}</p>
    </div>

    <!-- MOBILE -->
    <div class="profile-field">
      <label>Mobile</label>
      <p>{{ mobile }}</p>
    </div>

    <!-- FLATS -->
    <div class="profile-field">
      <label>Flats</label>
      <div *ngFor="let flat of flats" class="flat-box">
        Block {{ flat.block }} - Flat {{ flat.flat }}
        <span *ngIf="flat.type" class="flat-type">
          ({{ flat.type }})
        </span>
      </div>
    </div>

  </div>
</section>
