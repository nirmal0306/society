<app-resident-nav></app-resident-nav>
<section class="complaint-section">

  <div class="complaint-card">

    <h2>Raise a Complaint</h2>

    <form (ngSubmit)="submitComplaint()">

      <!-- Resident Info -->
      <div class="grid">

        <div class="form-group">
          <label>Name</label>
          <input type="text" [value]="name" readonly>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [value]="email" readonly>
        </div>

        <div class="form-group">
          <label>Block</label>
          <input type="text" [value]="flats[0]?.block" readonly>
        </div>

        <div class="form-group">
          <label>Flat No</label>
          <input type="text" [value]="flats[0]?.flat" readonly>
        </div>

      </div>

      <!-- Complaint Details -->
      <div class="form-group">
        <label>Subject</label>
        <input type="text"
               [(ngModel)]="complaint.subject"
               name="subject"
               placeholder="Enter complaint subject">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select [(ngModel)]="complaint.category" name="category">
          <option value="">Select Category</option>
          <option value="Maintenance">Maintenance</option>
          <option value="Water Issue">Water Issue</option>
          <option value="Electricity">Electricity</option>
          <option value="Security">Security</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="4"
                  [(ngModel)]="complaint.description"
                  name="description"
                  placeholder="Describe your issue...">
        </textarea>
      </div>

      <button type="submit">
        Submit Complaint
      </button>

    </form>

  </div>

</section>
