<app-resident-nav></app-resident-nav>

<div class="hero">
<div class="hero-content">
  <h1 class="hero-title">Visitor Requests</h1>

  <div *ngIf="loading">Loading visitors...</div>

  <div *ngIf="!loading && visitors.length === 0" class="empty-text">
    No visitor requests found
  </div>

  <!-- Horizontal Scroll Container -->
  <div class="visitor-scroll" *ngIf="!loading && visitors.length > 0">
    <div class="visitor-card" *ngFor="let v of pagedVisitors">
      <img *ngIf="v.photo" [src]="'http://localhost:5000' + v.photo" class="visitor-photo">
      <h3>{{v.name}}</h3>
      <p><b>Mobile:</b> {{v.mobile}}</p>
      <p><b>Purpose:</b> {{v.purpose}}</p>
      <p><b>Flat:</b> {{v.block}} - {{v.flat}}</p>
      <p><b>Added By:</b> {{v.addedBy}}</p>
      <p style="color:white;" [class]="getStatusClass(v.status)">{{v.status}}</p>

      <div *ngIf="v.status == 'Pending'" class="btns">
        <button class="approve" (click)="approveVisitor(v._id)">Accept</button>
        <button class="reject" (click)="rejectVisitor(v._id)">Reject</button>
      </div>
    </div>
  </div>

  <!-- Pagination Buttons -->
  <div class="pagination" *ngIf="totalPages > 1">
    <button class="page-btn"
            *ngFor="let p of [].constructor(totalPages); let i = index"
            [class.active]="currentPage === i+1"
            (click)="setPage(i+1)">
      {{i + 1}}
    </button>
  </div>
</div>
</div>
