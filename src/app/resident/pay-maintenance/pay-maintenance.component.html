<section class="hero">
<app-resident-nav></app-resident-nav>
  <div class="hero-content">
    <div class="form-card">
      <div class="hero-overline">Maintenance Management</div>
      <h1 class="hero-title">Pay Maintenance</h1>

      <div *ngIf="name">

        <div class="resident-info">
          <label>Name:</label>
          <input [(ngModel)]="name" readonly>
          <label>Email:</label>
          <input [(ngModel)]="email" readonly>
        </div>


        <h3>Your Flats</h3>
        <div class="form-row" *ngFor="let f of selectedFlats; let i = index">
          <div class="form-group">
            <label>Block</label>
            <div class="custom-select"><div class="selected-value">{{ f.block }}</div></div>
          </div>
          <div class="form-group">
            <label>Flat</label>
            <div class="custom-select"><div class="selected-value">{{ f.flat }}</div></div>
          </div>
          <div class="form-group action-btns">
            <button type="button" *ngIf="i === selectedFlats.length - 1 && selectedFlats.length < flats.length" (click)="addFlat()">➕</button>
            <button type="button" *ngIf="selectedFlats.length > 1" (click)="removeFlat(i)">➖</button>
          </div>
        </div>


        <button (click)="payFullYear()" class="pay-btn">Pay for Whole Year</button>


        <h3>Select Months</h3>
        <div class="months-container">
          <div *ngFor="let f of selectedFlats" class="flat-months">
            <span class="flat-label">{{ f.block }}-{{ f.flat }}</span>
            <div class="checkbox-group">
              <label *ngFor="let m of allMonths" class="checkbox-wrapper" [class.disabled]="isPaid(f.block,f.flat,m)">
                <input type="checkbox" [disabled]="isPaid(f.block,f.flat,m)" [(ngModel)]="selectedFlatMonths[f.block + '-' + f.flat + '-' + m]" (change)="calculateAmount()">
                <span class="checkbox-custom"></span>
                {{ m }} <span *ngIf="isPaid(f.block,f.flat,m)">(Paid)</span>
              </label>
            </div>
          </div>
        </div>


        <h3>Total: ₹{{ amount }}</h3>


        <button (click)="openPaymentModal()" class="pay-btn">Pay Now</button>

        <app-payment-modal
          [residentId]="residentId"
          *ngIf="showPaymentModal"
          [selectedFlats]="selectedFlats"
          [selectedFlatMonths]="selectedFlatMonths"
          [amount]="amount"
          (closeModal)="handleCloseModal()"
          (paymentSuccess)="handlePaymentSuccess($event)">
        </app-payment-modal>
      </div>
    </div>
  </div>
</section>
