<app-security-nav></app-security-nav>
<!-- ================= PROFILE HERO ================= -->
<div class="admin-hero profile-hero">
  <div class="admin-hero-content">
    <h1>Security Profile</h1>
    <p class="tagline">Your account details</p>
  </div>
</div>

<!-- ================= PROFILE ================= -->
<section class="profile-section">
  <div class="profile-glass">

    <div class="profile-avatar-container">

      <img *ngIf="photo"
           [src]="'http://localhost:5000' + photo"
           class="profile-photo"
           alt="Profile Photo">

      <div *ngIf="!photo" class="profile-avatar">
        {{ name ? (name.charAt(0) | uppercase) : 'S' }}
      </div>

    </div>

    <div class="profile-field">
      <label>Name</label>
      <p>{{ name }}</p>
    </div>

    <div class="profile-field">
      <label>Email</label>
      <p>{{ email }}</p>
    </div>

    <div class="profile-field">
      <label>Mobile</label>
      <p>{{ mobile }}</p>
    </div>

    <div class="profile-field">
      <label>Shift</label>
      <p>{{ shift }}</p>
    </div>

  </div>
</section>
